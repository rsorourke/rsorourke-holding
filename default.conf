# Per-Host display name. Default = the bare domain; add a line for a nicer name.
# (map must live at http{} level — conf.d/*.conf is included there.)
map $host $sitename {
    default        $host;
    rsorourke.com  "Richard S O'Rourke";
    # kinetik-nrg.com    "Kinetik NRG";
    # esgforsme.co.uk    "ESG for SME";
    # smeconomics.co.uk  "SMEconomics";
    # tsoel.ac           "TSOEL";
}

server {
    listen 80;
    listen [::]:80;
    server_name _;
    root /usr/share/nginx/html;

    # Inject the per-Host name + domain into the static page at serve time,
    # so one deployment backs every parked domain with the right label.
    sub_filter_once off;
    sub_filter_types text/html;
    sub_filter '__SITENAME__' '$sitename';
    sub_filter '__DOMAIN__'   '$host';

    location / {
        try_files /index.html =404;
    }
}
